<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404DEV AI — Find Your AI Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1rem;
      animation: fadeIn 0.8s ease-out;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .container { max-width: 600px; width: 100%; text-align: center; }
    h1 { font-size: 2.5rem; font-weight: 700; margin-bottom: 0.5rem; letter-spacing: -0.5px; }
    .accent { color: #7C3AED; }
    .subtitle { color: #a1a1aa; font-size: 1.1rem; margin-bottom: 2.5rem; line-height: 1.5; }
    .form-group { margin-bottom: 1.5rem; text-align: left; }
    label { display: block; font-size: 0.9rem; font-weight: 500; color: #d4d4d8; margin-bottom: 0.5rem; }
    input, select {
      width: 100%; padding: 0.9rem 1rem;
      background: #18181b; border: 1px solid #27272a; border-radius: 10px;
      color: #fff; font-size: 1rem;
      transition: border 0.2s, box-shadow 0.2s;
    }
    input:focus, select:focus { outline: none; border-color: #7C3AED; box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
    select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23a1a1aa' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
      background-repeat: no-repeat; background-position: right 1rem center; background-size: 1.2rem;
    }
    button {
      width: 100%; padding: 1rem;
      background: #7C3AED; color: white; border: none; border-radius: 10px;
      font-size: 1.1rem; font-weight: 600; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    }
    button:hover { background: #6d28d9; }
    button:active { transform: scale(0.98); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }
    button.loading .spinner { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .results { margin-top: 2.5rem; animation: fadeIn 0.6s ease-out; }
    .card {
      background: #18181b; border: 1px solid #27272a; border-radius: 12px;
      padding: 1.5rem; margin-bottom: 1.2rem; text-align: left;
      transition: transform 0.2s, border-color 0.2s;
    }
    .card:hover { border-color: #7C3AED; transform: translateY(-2px); }
    .card-title { font-size: 1.3rem; font-weight: 600; color: #7C3AED; margin-bottom: 0.8rem; }
    .card-detail { font-size: 0.95rem; color: #d4d4d8; margin-bottom: 0.5rem; line-height: 1.5; }
    .card-label { font-weight: 600; color: #a78bfa; margin-right: 0.3rem; }
    .cta-button {
      display: inline-block; margin-top: 2rem;
      padding: 1rem 2rem; background: #7C3AED; color: white;
      text-decoration: none; border-radius: 10px; font-weight: 600;
      transition: background 0.2s; animation: fadeIn 0.6s ease-out;
    }
    .cta-button:hover { background: #6d28d9; }
    .error-message { color: #ef4444; background: #1f1315; border: 1px solid #3b1010; border-radius: 8px; padding: 1rem; margin-top: 1rem; animation: fadeIn 0.3s ease-out; }
    
    /* Modal styles */
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      animation: fadeIn 0.2s ease;
    }
    .modal-overlay.hidden { display: none; }
    .modal-box {
      background: #18181b; border: 1px solid #27272a; border-radius: 16px;
      padding: 2rem; max-width: 450px; width: 90%;
    }
    .modal-box h3 { font-size: 1.3rem; margin-bottom: 0.5rem; }
    .modal-box p { color: #a1a1aa; margin-bottom: 1.5rem; line-height: 1.5; font-size: 0.95rem; }
    .modal-warning { color: #fbbf24; font-size: 0.85rem; margin-bottom: 1rem; }
    .modal-buttons { display: flex; gap: 10px; }
    .btn-primary {
      flex: 1; background: #7C3AED; color: white; border: none; border-radius: 10px;
      padding: 0.8rem; font-weight: 600; cursor: pointer; font-size: 0.95rem;
    }
    .btn-primary:hover { background: #6d28d9; }
    .btn-secondary {
      flex: 1; background: #27272a; color: #a1a1aa; border: none; border-radius: 10px;
      padding: 0.8rem; font-weight: 600; cursor: pointer; font-size: 0.95rem;
    }
    .btn-secondary:hover { background: #3f3f46; }
    .deploy-badge {
      font-size: 0.7rem; opacity: 0.6; float: right;
      background: #7C3AED22; padding: 4px 10px; border-radius: 20px;
    }
    .deploy-link { color: #7C3AED; word-break: break-all; }
    @media (max-width: 480px) { h1 { font-size: 2rem; } }
  </style>
</head>
<body>
  <div class="container">
    <h1>404<span class="accent">DEV AI</span></h1>
    <p class="subtitle">Paste your business URL, pick your industry, and discover the AI agent your business actually needs.</p>
    <form id="analyzeForm">
      <div class="form-group">
        <label for="url">Website URL</label>
        <input type="url" id="url" placeholder="https://yourbusiness.com" autofocus>
      </div>
      <div class="form-group">
        <label for="industry">Industry</label>
        <select id="industry" required>
          <option value="" disabled selected>Select your industry</option>
          <option>Real Estate</option>
          <option>Salon/Spa</option>
          <option>Legal</option>
          <option>Medical/Dental</option>
          <option>Restaurant</option>
          <option>Contractor/Home Services</option>
          <option>E-commerce</option>
          <option>Coaching/Consulting</option>
          <option>Other</option>
        </select>
      </div>
      <button type="submit" id="submitBtn">
        <span class="button-text">Analyze My Site</span>
        <div class="spinner"></div>
      </button>
    </form>
    <div id="results" class="results" style="display: none;"></div>
    <div id="cta-section" style="display: none;">
      <a href="https://vladavetisian.github.io/Elite_Circle_Club/" class="cta-button" target="_blank" rel="noopener">
        Want us to build this for you?
      </a>
    </div>
  </div>

  <script>
    const form = document.getElementById('analyzeForm');
    const resultsDiv = document.getElementById('results');
    const ctaSection = document.getElementById('cta-section');
    const submitBtn = document.getElementById('submitBtn');

    // Check if returning from GitHub OAuth
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.get('deploy') === 'true') {
      const pendingDeploy = sessionStorage.getItem('pendingDeploy');
      if (pendingDeploy) {
        handleDeploy(JSON.parse(pendingDeploy));
        sessionStorage.removeItem('pendingDeploy');
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('url').value;
      const industry = document.getElementById('industry').value;

      if (!url) {
        resultsDiv.innerHTML = '<div class="error-message">Please enter a website URL.</div>';
        resultsDiv.style.display = 'block';
        return;
      }

      submitBtn.disabled = true; submitBtn.classList.add('loading');
      resultsDiv.style.display = 'none'; ctaSection.style.display = 'none'; resultsDiv.innerHTML = '';

      try {
        const response = await fetch('/api/analyze', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, industry })
        });
        const data = await response.json();
        if (!response.ok) throw new Error(data.error || 'Something went wrong');

        const businessName = extractBusinessName(url);

        if (data.recommendations && data.recommendations.length > 0) {
          let html = '';
          data.recommendations.forEach(rec => {
            const encodedRec = encodeURIComponent(JSON.stringify({
              agentType: rec.agentType,
              businessName: businessName,
              industry: industry,
              websiteUrl: url
            }));
            html += `<div class="card" style="cursor: pointer;" onclick='openDeployModal("${escapeHtml(rec.agentType)}", "${escapeHtml(businessName)}", "${escapeHtml(industry)}", "${escapeHtml(url)}")'>
              <div class="card-title">${escapeHtml(rec.agentType)} <span class="deploy-badge">⚡ Deploy →</span></div>
              <div class="card-detail"><span class="card-label">Why it fits:</span>${escapeHtml(rec.whyFits)}</div>
              <div class="card-detail"><span class="card-label">Problem solved:</span>${escapeHtml(rec.problemSolved)}</div>
              <div class="card-detail"><span class="card-label">Estimated impact:</span>${escapeHtml(rec.estimatedImpact)}</div>
            </div>`;
          });
          resultsDiv.innerHTML = html;
          resultsDiv.style.display = 'block'; ctaSection.style.display = 'block';
        } else if (data.rawResponse) {
          resultsDiv.innerHTML = `<div class="card"><div class="card-detail">${escapeHtml(data.rawResponse)}</div></div>`;
          resultsDiv.style.display = 'block'; ctaSection.style.display = 'block';
        } else {
          resultsDiv.innerHTML = '<p>No recommendations could be generated.</p>';
          resultsDiv.style.display = 'block';
        }
      } catch (error) {
        resultsDiv.innerHTML = `<div class="error-message">${escapeHtml(error.message)}</div>`;
        resultsDiv.style.display = 'block';
      } finally {
        submitBtn.disabled = false; submitBtn.classList.remove('loading');
      }
    });

    function extractBusinessName(url) {
      try {
        const hostname = new URL(url).hostname;
        return hostname.replace('www.', '').split('.')[0].replace(/-/g, ' ');
      } catch {
        return 'Your Business';
      }
    }

    function openDeployModal(agentType, businessName, industry, websiteUrl) {
      // Remove existing modal if any
      const existingModal = document.getElementById('deployModal');
      if (existingModal) existingModal.remove();

      const modalHTML = `
        <div class="modal-overlay" id="deployModal">
          <div class="modal-box">
            <h3>Deploy <span style="color: #7C3AED;">${escapeHtml(agentType)}</span></h3>
            <p>This will create a GitHub repository with your AI agent and deploy it live to GitHub Pages — free and instant.</p>
            <p style="color: #d4d4d8; font-size: 0.9rem;"><strong>Business:</strong> ${escapeHtml(businessName)}</p>
            <p class="modal-warning">⚠️ One-time GitHub authorization required (free).</p>
            <div class="modal-buttons">
              <button class="btn-primary" id="confirmDeployBtn">Deploy Now</button>
              <button class="btn-secondary" id="cancelDeployBtn">Cancel</button>
            </div>
          </div>
        </div>
      `;

      document.body.insertAdjacentHTML('beforeend', modalHTML);

      document.getElementById('confirmDeployBtn').onclick = () => {
        document.getElementById('deployModal').remove();
        handleDeploy({ agentType, businessName, industry, websiteUrl });
      };

      document.getElementById('cancelDeployBtn').onclick = () => {
        document.getElementById('deployModal').remove();
      };

      document.getElementById('deployModal').onclick = function(e) {
        if (e.target === this) this.remove();
      };
    }

    async function handleDeploy({ agentType, businessName, industry, websiteUrl }) {
      const statusDiv = document.createElement('div');
      statusDiv.className = 'card';
      statusDiv.innerHTML = '<div class="card-detail">🚀 Deploying your AI agent to GitHub Pages...</div>';
      resultsDiv.insertBefore(statusDiv, resultsDiv.firstChild);
      statusDiv.scrollIntoView({ behavior: 'smooth' });

      try {
        const response = await fetch('/api/deploy-bot', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ agentType, businessName, industry, websiteUrl })
        });

        const data = await response.json();

        if (!response.ok) {
          if (response.status === 401 && data.authUrl) {
            sessionStorage.setItem('pendingDeploy', JSON.stringify({ agentType, businessName, industry, websiteUrl }));
            window.location.href = data.authUrl;
            return;
          }
          throw new Error(data.error || 'Deployment failed');
        }

        statusDiv.innerHTML = `
          <div class="card-detail" style="color: #4ade80; font-size: 1.1rem;">✅ Agent deployed successfully!</div>
          <div class="card-detail" style="margin-top: 12px;"><span class="card-label">Live URL:</span> <a href="${data.deployedUrl}" target="_blank" class="deploy-link">${data.deployedUrl}</a></div>
          <div class="card-detail"><span class="card-label">Repo:</span> <a href="${data.repoUrl}" target="_blank" class="deploy-link">${data.repoUrl}</a></div>
          <p style="color: #a1a1aa; font-size: 0.8rem; margin-top: 8px;">It may take 1-2 minutes for GitHub Pages to publish.</p>
        `;

      } catch (error) {
        statusDiv.innerHTML = `<div class="error-message">❌ Deployment failed: ${escapeHtml(error.message)}</div>`;
      }
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | 404DEV AI</title>
  <style>
    body { background: #0a0a0a; color: white; font-family: system-ui; padding: 20px; }
    .container { max-width: 800px; margin: auto; }
    h1 { color: #7C3AED; }
    .card { background: #111; border: 1px solid #333; border-radius: 10px; padding: 16px; margin: 12px 0; }
    .login-btn { background: #7C3AED; color: white; padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; margin-top: 20px; }
    .logout-btn { background: #333; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; float: right; }
    .stats { color: #4ade80; font-weight: bold; }
    .back-link { color: #aaa; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 404DEV AI Dashboard</h1>
    <button class="logout-btn" onclick="logout()" id="logoutBtn" style="display:none;">Logout</button>
    <a href="/" class="back-link">← Back to analyzer</a>
    <div id="content"></div>
  </div>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token') || localStorage.getItem('github_token');

    if (token) {
      localStorage.setItem('github_token', token);
      window.history.replaceState({}, document.title, '/dashboard');
      document.getElementById('logoutBtn').style.display = 'inline-block';
      loadDashboard(token);
    } else {
      document.getElementById('content').innerHTML = `
        <p>Login with GitHub to see your agents.</p>
        <a href="/api/github-oauth?redirect=/dashboard" class="login-btn">🔑 Login with GitHub</a>
      `;
    }

    async function loadDashboard(token) {
      try {
        const res = await fetch('/api/dashboard', { headers: { Authorization: `Bearer ${token}` } });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);
        renderDashboard(data);
      } catch (err) {
        document.getElementById('content').innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    }

    function renderDashboard(data) {
      let html = `<h2>Welcome, ${data.username}</h2>`;
      if (data.agents.length === 0) {
        html += `<p>No agents deployed yet. <a href="/">Create one</a></p>`;
      } else {
        data.agents.forEach(agent => {
          html += `<div class="card">
            <h3>${agent.agentType} — ${agent.businessName}</h3>
            <p>Industry: ${agent.industry}</p>
            <p>Messages: <span class="stats">${agent.totalMessages}</span></p>
            <p><a href="${agent.deployedUrl}" target="_blank">Live widget</a> | <a href="${agent.repoUrl}" target="_blank">Repo</a></p>
          </div>`;
        });
      }
      document.getElementById('content').innerHTML = html;
    }

    function logout() {
      localStorage.removeItem('github_token');
      window.location.reload();
    }
  </script>
</body>
</html>
